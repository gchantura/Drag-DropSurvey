<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>

<body>
    <form id="survey-form">
        <div class="form-group">
            <label for="input-470afd35-e021-46c1-831e-c55ed18d0379">Full Name </label>
            <input type="text" id="input-470afd35-e021-46c1-831e-c55ed18d0379"
                name="input-470afd35-e021-46c1-831e-c55ed18d0379" placeholder="">

        </div>
        <div class="form-group">
            <label>Rating Component </label>
            <div class="rating">
                <input type="radio" id="rating-dd2e503c-3b81-4a4d-8380-81572386c721-1"
                    name="rating-dd2e503c-3b81-4a4d-8380-81572386c721" value="1">
                <label for="rating-dd2e503c-3b81-4a4d-8380-81572386c721-1">1</label>
                <input type="radio" id="rating-dd2e503c-3b81-4a4d-8380-81572386c721-2"
                    name="rating-dd2e503c-3b81-4a4d-8380-81572386c721" value="2">
                <label for="rating-dd2e503c-3b81-4a4d-8380-81572386c721-2">2</label>
                <input type="radio" id="rating-dd2e503c-3b81-4a4d-8380-81572386c721-3"
                    name="rating-dd2e503c-3b81-4a4d-8380-81572386c721" value="3">
                <label for="rating-dd2e503c-3b81-4a4d-8380-81572386c721-3">3</label>
                <input type="radio" id="rating-dd2e503c-3b81-4a4d-8380-81572386c721-4"
                    name="rating-dd2e503c-3b81-4a4d-8380-81572386c721" value="4">
                <label for="rating-dd2e503c-3b81-4a4d-8380-81572386c721-4">4</label>
                <input type="radio" id="rating-dd2e503c-3b81-4a4d-8380-81572386c721-5"
                    name="rating-dd2e503c-3b81-4a4d-8380-81572386c721" value="5">
                <label for="rating-dd2e503c-3b81-4a4d-8380-81572386c721-5">5</label>
            </div>

        </div>
        <div class="form-group">
            <p>Text Component</p>
        </div>
        <div class="introduction">
            <h2>Introduction Component</h2>
            <p>Description...</p>
        </div>
        <div class="form-group">
            <label for="textarea-866a0023-a0cf-4e59-970b-e55d8948e6ac">This is text area </label>
            <textarea id="textarea-866a0023-a0cf-4e59-970b-e55d8948e6ac"
                name="textarea-866a0023-a0cf-4e59-970b-e55d8948e6ac" rows="5" placeholder="Add the Comment"></textarea>
            <div class="help-text">this is a place of comment</div>
        </div>
        <div class="form-group">
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
